<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GhostTrace</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="header d-flex justify-content-between align-items-center px-3">
  <div>
    <strong>GhostTrace</strong>
    <span class="made-by">made by fmcredo</span>
  </div>
  <a href="https://github.com/ArturDuisheev/" target="_blank" class="github-link">
    GitHub ↗
  </a>
</div>

<div class="container-fluid">
<div class="row">
<div class="col-4 sidebar">
  <div class="p-3">
    <input type="file" id="fileInput" class="form-control mb-2" multiple>
    <input type="text" id="search" class="form-control mb-2" placeholder="🔍 search...">
    <button class="btn btn-danger w-100" onclick="clearStorage()">Очистить</button>
  </div>
  <div id="list"></div>
</div>
<div class="col-8 details p-3">
  <h5>Event Details</h5>
  <div id="viewer">Выбери событие</div>
</div>

</div>
</div>
<script src="app.js"></script>
</body>
</html>
